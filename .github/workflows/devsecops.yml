name: MedUnity DevSecOps - Clean PHP Edition

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  security-events: write
  contents: read

jobs:

  # =========================================================
  # SAST - PHPSTAN (FAIL POLICY CORE)
  # =========================================================
  phpstan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction || true

      - name: Install PHPStan
        run: composer require --dev phpstan/phpstan || true

      - name: Run PHPStan (STRICT)
        run: |
          mkdir -p reports
          vendor/bin/phpstan analyse . --level=max --error-format=json > reports/phpstan.json

      - name: Fail if PHPStan errors exist
        run: |
          ERRORS=$(cat reports/phpstan.json | jq '.totals.errors')

          echo "PHPStan errors: $ERRORS"

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ PHPStan failed (security gate)"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: phpstan-report
          path: reports/phpstan.json


  # =========================================================
  # SAST - SEMGREP (SECURITY RULES PHP)
  # =========================================================
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (STRICT SECURITY)
        run: |
          mkdir -p reports

          semgrep scan \
            --config=p/php \
            --config=p/security-audit \
            --severity ERROR \
            --sarif \
            --output reports/semgrep.sarif \
            . || true

          semgrep scan \
            --config=p/php \
            --config=p/security-audit \
            --json \
            --output reports/semgrep.json \
            . || true

      - name: Fail pipeline if high severity issues exist
        run: |
          COUNT=$(cat reports/semgrep.json | jq '[.results[] | select(.extra.severity=="ERROR")] | length')

          echo "Semgrep critical issues: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Semgrep SECURITY GATE FAILED"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/


  # =========================================================
  # SCA - COMPOSER AUDIT
  # =========================================================
  composer-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction || true

      - name: Composer security audit
        run: |
          mkdir -p reports
          composer audit --format=json > reports/composer-audit.json || true

      - name: Fail on vulnerabilities
        run: |
          VULN=$(cat reports/composer-audit.json | jq '.advisories | length')

          echo "Composer vulnerabilities: $VULN"

          if [ "$VULN" -gt 0 ]; then
            echo "❌ Composer security gate failed"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: composer-audit
          path: reports/composer-audit.json


  # =========================================================
  # SCA - TRIVY (FILESYSTEM)
  # =========================================================
  trivy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan project
        run: |
          mkdir -p reports
          trivy fs --severity HIGH,CRITICAL --format json -o reports/trivy.json . || true

      - name: Fail on HIGH/CRITICAL
        run: |
          HIGH=$(cat reports/trivy.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length')

          echo "Trivy HIGH/CRITICAL: $HIGH"

          if [ "$HIGH" -gt 0 ]; then
            echo "❌ Trivy security gate failed"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy.json


  # =========================================================
  # SECRET SCANNING - GITLEAKS
  # =========================================================
  gitleaks:
    name: Secret Scanning - Gitleaks (Enterprise)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # 1. RUN GITLEAKS (NEVER FAIL HERE)
      # =====================================================
      - name: Run Gitleaks scan
        run: |
          mkdir -p reports

          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --report-format json \
            --report-path /repo/reports/gitleaks.json \
            --exit-code 0 || true

          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --report-format sarif \
            --report-path /repo/reports/gitleaks.sarif \
            --exit-code 0 || true

      # =====================================================
      # 2. ENSURE FILES EXIST (SAFE GUARD)
      # =====================================================
      - name: Ensure report integrity
        run: |
          mkdir -p reports

          if [ ! -f reports/gitleaks.json ]; then
            echo "[]" > reports/gitleaks.json
          fi

          if [ ! -f reports/gitleaks.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > reports/gitleaks.sarif
          fi

      # =====================================================
      # 3. DEBUG (OPTIONAL SAFE)
      # =====================================================
      - name: Debug detected files
        run: |
          echo "=== REPORT FILES ==="
          ls -R reports || true

          echo "=== PREVIEW ==="
          cat reports/gitleaks.json || true

      # =====================================================
      # 4. SECURITY POLICY ENGINE (FAIL GATE)
      # =====================================================
      - name: Security Policy Evaluation
        run: |
          echo "Evaluating secrets severity..."

          SECRETS_TOTAL=$(jq length reports/gitleaks.json)

          HIGH_SECRETS=$(jq '[.[] | select(.Severity=="high" or .Severity=="HIGH")] | length' reports/gitleaks.json)

          MEDIUM_SECRETS=$(jq '[.[] | select(.Severity=="medium" or .Severity=="MEDIUM")] | length' reports/gitleaks.json)

          echo "Total secrets: $SECRETS_TOTAL"
          echo "High severity: $HIGH_SECRETS"
          echo "Medium severity: $MEDIUM_SECRETS"

          # ==============================
          # POLICY (BANKING GRADE RULES)
          # ==============================
          if [ "$HIGH_SECRETS" -gt 0 ]; then
            echo "❌ BLOCKED: HIGH severity secrets detected"
            exit 1
          fi

          if [ "$SECRETS_TOTAL" -gt 10 ]; then
            echo "❌ BLOCKED: Too many secrets detected (risk threshold exceeded)"
            exit 1
          fi

          echo "✅ Security policy passed"

      # =====================================================
      # 5. UPLOAD ARTIFACTS
      # =====================================================
      - name: Upload Gitleaks reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-reports
          path: |
            reports/gitleaks.json
            reports/gitleaks.sarif

      # =====================================================
      # 6. GITHUB SECURITY TAB (SARIF)
      # =====================================================
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/gitleaks.sarif
          category: gitleaks-enterprise
  # =========================================================
  # SECURITY SCORE ENGINE (REALISTIC)
  # =========================================================
  security-score:
    runs-on: ubuntu-latest
    needs: [phpstan, semgrep, composer-audit, trivy, gitleaks]

    steps:
      - uses: actions/checkout@v4

      - name: Compute security score
        run: |
          mkdir -p reports

          SCORE=100

          echo "Initial score: $SCORE"

          # simple penalty logic (realistic)
          SCORE=$((SCORE - 20)) # phpstan gate
          SCORE=$((SCORE - 20)) # semgrep
          SCORE=$((SCORE - 20)) # composer
          SCORE=$((SCORE - 20)) # trivy
          SCORE=$((SCORE - 20)) # gitleaks

          echo "{ \"security_score\": $SCORE }" > reports/security-score.json

          echo "FINAL SECURITY SCORE = $SCORE"

          if [ "$SCORE" -lt 70 ]; then
            echo "❌ SECURITY SCORE TOO LOW"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: security-score
          path: reports/security-score.json


  # =========================================================
  # OPTIONAL DEPLOY (ONLY IF PASSED)
  # =========================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [security-score]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/medunity
            git pull origin main
            systemctl restart apache2 || true
