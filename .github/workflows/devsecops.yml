name: MedUnity DevSecOps - PHP Enterprise Clean

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  security-events: write
  contents: read

jobs:

  # =========================================================
  # PHPSTAN (SAST CORE)
  # =========================================================
  phpstan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install PHPStan
        run: composer require --dev phpstan/phpstan

      - name: Run PHPStan
        run: |
          mkdir -p reports
          vendor/bin/phpstan analyse . --level=max --error-format=json > reports/phpstan.json || true

      - name: PHPStan Security Gate
        run: |
          ERRORS=$(jq '.totals.errors' reports/phpstan.json)

          echo "PHPStan errors: $ERRORS"

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ PHPStan failed"
            exit 1
          fi

      - name: Upload PHPStan Report
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-report
          path: reports/phpstan.json


  # =========================================================
  # SEMGREP (PHP SECURITY SAST)
  # =========================================================
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (security-only baseline)
        run: |
          mkdir -p reports

          semgrep scan \
            --config=p/php \
            --config=p/security-audit \
            --severity ERROR \
            --sarif \
            --output reports/semgrep.sarif \
            . || true

          semgrep scan \
            --config=p/security-audit \
            --json \
            --output reports/semgrep.json \
            . || true

      - name: Fail only on REAL critical vulnerabilities
        run: |
          CRITICAL=$(jq '[.results[]
            | select(.extra.severity=="ERROR")
          ] | length' reports/semgrep.json)

          echo "Critical issues: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ BLOCKED: Critical security issues only"
            exit 1
          fi

          echo "✅ Passed security gate (warnings ignored)"

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/
  # =========================================================
  # COMPOSER AUDIT (SCA PHP)
  # =========================================================
  composer-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Composer Audit
        run: |
          mkdir -p reports
          composer audit --format=json > reports/composer-audit.json || true

      - name: Security Gate
        run: |
          VULN=$(jq '.advisories | length' reports/composer-audit.json)

          echo "Composer vulnerabilities: $VULN"

          if [ "$VULN" -gt 0 ]; then
            echo "❌ Composer vulnerabilities detected"
            exit 1
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit
          path: reports/composer-audit.json


  # =========================================================
  # GITLEAKS (SECRETS SCAN - REAL)
  # =========================================================
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          mkdir -p reports

          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect \
            --source /repo \
            --report-format json \
            --report-path /repo/reports/gitleaks.json \
            --exit-code 0 || true

          # safe fallback
          if [ ! -f reports/gitleaks.json ] || [ ! -s reports/gitleaks.json ]; then
            echo "[]" > reports/gitleaks.json
          fi

      - name: Security Gate (ROBUST JSON SAFE)
        run: |
          echo "Evaluating secrets..."

          # total findings safe parse
          TOTAL=$(jq 'length' reports/gitleaks.json 2>/dev/null || echo 0)

          # robust high-risk detection (NO Severity dependency)
          HIGH=$(jq '
            [.[] | select(
              (.RuleID // "" | tostring | test("aws|key|token|secret|password|private|api"; "i"))
            )] | length
          ' reports/gitleaks.json 2>/dev/null || echo 0)

          echo "Total findings: $TOTAL"
          echo "High risk findings: $HIGH"

          # POLICY
          if [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED: HIGH RISK SECRETS DETECTED"

            jq '
              .[] | select(
                (.RuleID // "" | tostring | test("aws|key|token|secret|password|private|api"; "i"))
              )
            ' reports/gitleaks.json || true

            exit 1
          fi

          if [ "$TOTAL" -gt 100 ]; then
            echo "❌ BLOCKED: TOO MANY FINDINGS (>100)"
            exit 1
          fi

          echo "✅ Gitleaks passed security policy"

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks.json

  # =========================================================
  # SECURITY REPORT AGGREGATION (REAL METRICS ONLY)
  # =========================================================
  security-report:
    runs-on: ubuntu-latest
    needs: [phpstan, semgrep, composer-audit, gitleaks]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Build Real Security Report
        run: |
          mkdir -p reports

          PHPSTAN_ERRORS=$(jq '.totals.errors' reports/phpstan-report/phpstan.json)
          COMPOSER_VULN=$(jq '.advisories | length' reports/composer-audit/composer-audit.json)
          SECRETS=$(jq length reports/gitleaks-report/gitleaks.json)

          echo "{
            \"phpstan_errors\": $PHPSTAN_ERRORS,
            \"composer_vulnerabilities\": $COMPOSER_VULN,
            \"secrets\": $SECRETS
          }" > reports/security-report.json

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security-report.json


  # =========================================================
  # DEPLOY (ONLY IF ALL PASSED)
  # =========================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [security-report]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/medunity
            git pull origin main
            composer install --no-dev --optimize-autoloader
            systemctl restart apache2 || true